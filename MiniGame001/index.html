<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>便利店小店主</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 600px;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .game-link {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            text-decoration: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .game-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .info {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            text-align: left;
        }

        .info h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .info ul {
            list-style: none;
            padding: 0;
        }

        .info li {
            padding: 5px 0;
            color: #666;
        }

        .info li::before {
            content: "✓ ";
            color: #4caf50;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏪 便利店小店主</h1>
        <p>
            欢迎来到《便利店小店主》！<br>
            经营你的便利店，赚取金币，升级设施，成为最成功的店主！
        </p>

        <a href="便利店小店主.html" class="game-link">开始游戏</a>

        <div class="info">
            <h3>🎮 游戏说明</h3>
            <ul>
                <li>点击商品查看详情、调整价格</li>
                <li>点击 + 增加库存、点击 - 调整价格</li>
                <li>顾客会自动购买商品</li>
                <li>赚取金币升级收银台和货架</li>
            </ul>
        </div>
    </div>
</body>
</html>
