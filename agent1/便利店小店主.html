<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>便利店小店主 - MVP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .section {
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .product {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .product:hover {
            transform: scale(1.05);
        }

        .product.selected {
            background: #e3f2fd;
            border: 2px solid #2196f3;
        }

        .product-name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .product-stock {
            font-size: 12px;
            color: #666;
        }

        .product-price {
            font-size: 14px;
            color: #2196f3;
            margin-top: 5px;
        }

        .product-controls {
            display: flex;
            gap: 5px;
            margin-top: 10px;
        }

        .btn {
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-up {
            background: #4caf50;
            color: white;
        }

        .btn-down {
            background: #f44336;
            color: white;
        }

        .btn-add {
            background: #2196f3;
            color: white;
            width: 100%;
        }

        .customers {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            min-height: 100px;
        }

        .customer {
            background: white;
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .customer-name {
            font-weight: bold;
        }

        .customer-waiting {
            color: #f44336;
        }

        .customer-served {
            color: #4caf50;
        }

        .upgrade-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .upgrade-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .upgrade-level {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .upgrade-cost {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
        }

        .btn-upgrade {
            background: #ff9800;
            color: white;
            width: 100%;
        }

        .message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .message.show {
            opacity: 1;
        }

        .game-info {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏪 便利店小店主 - MVP</h1>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">💰 金币</div>
                <div class="stat-value" id="gold">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">📦 营业额</div>
                <div class="stat-value" id="revenue">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">⭐ 等级</div>
                <div class="stat-value" id="level">1</div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">🛒 商品管理</div>
            <div class="products" id="products"></div>
        </div>

        <div class="section">
            <div class="section-title">👥 顾客</div>
            <div class="customers" id="customers"></div>
        </div>

        <div class="section">
            <div class="section-title">⬆️ 设施升级</div>
            <div class="upgrade-section" id="upgrades"></div>
        </div>

        <div class="game-info">
            点击商品查看详情 → 点击 + 增加库存 → 点击 - 降低价格<br>
            顾客会自动购买商品 → 使用金币升级设施
        </div>
    </div>

    <div class="message" id="message"></div>

    <script>
        // 游戏状态
        const gameState = {
            gold: 100,
            revenue: 0,
            level: 1,
            products: [
                { id: 1, name: '饮料', basePrice: 10, stock: 10, cost: 5, profitRate: 0.3 },
                { id: 2, name: '零食', basePrice: 8, stock: 10, cost: 4, profitRate: 0.25 },
                { id: 3, name: '日用品', basePrice: 6, stock: 10, cost: 3, profitRate: 0.2 }
            ],
            customers: [],
            upgrades: {
                register: 1,
                shelf: 1
            }
        };

        // 初始化商品显示
        function renderProducts() {
            const container = document.getElementById('products');
            container.innerHTML = '';

            gameState.products.forEach(product => {
                const div = document.createElement('div');
                div.className = 'product';
                div.innerHTML = `
                    <div class="product-name">${product.name}</div>
                    <div class="product-stock">库存: ${product.stock}</div>
                    <div class="product-price">价格: $${product.basePrice}</div>
                    <div class="product-controls">
                        <button class="btn btn-down" onclick="changePrice(${product.id}, -1)">-</button>
                        <button class="btn btn-up" onclick="changePrice(${product.id}, 1)">+</button>
                        <button class="btn btn-add" onclick="addStock(${product.id})">进货</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // 初始化设施升级显示
        function renderUpgrades() {
            const container = document.getElementById('upgrades');
            container.innerHTML = '';

            const upgrades = [
                { id: 'register', name: '收银台', baseCost: 500, effect: '提升服务速度' },
                { id: 'shelf', name: '货架', baseCost: 300, effect: '增加商品种类' }
            ];

            upgrades.forEach(upgrade => {
                const cost = upgrade.baseCost * gameState.upgrades[upgrade.id];
                const div = document.createElement('div');
                div.className = 'upgrade-box';
                div.innerHTML = `
                    <div class="upgrade-level">Lv.${gameState.upgrades[upgrade.id]}</div>
                    <div>${upgrade.name}</div>
                    <div class="upgrade-cost">升级: $${cost}</div>
                    <button class="btn btn-upgrade" onclick="upgrade('${upgrade.id}')">升级</button>
                `;
                container.appendChild(div);
            });
        }

        // 更新统计信息
        function updateStats() {
            document.getElementById('gold').textContent = gameState.gold;
            document.getElementById('revenue').textContent = gameState.revenue;
            document.getElementById('level').textContent = gameState.level;
        }

        // 更改价格
        function changePrice(productId, delta) {
            const product = gameState.products.find(p => p.id === productId);
            if (product) {
                product.basePrice = Math.max(1, product.basePrice + delta);
                renderProducts();
            }
        }

        // 添加库存
        function addStock(productId) {
            const product = gameState.products.find(p => p.id === productId);
            if (product) {
                const cost = Math.floor(product.cost * gameState.upgrades.shelf);
                if (gameState.gold >= cost) {
                    gameState.gold -= cost;
                    product.stock += 5;
                    showMessage(`进货成功！花费 $${cost}`);
                    renderProducts();
                    updateStats();
                } else {
                    showMessage('金币不足！');
                }
            }
        }

        // 升级设施
        function upgrade(type) {
            const baseCost = type === 'register' ? 500 : 300;
            const currentLevel = gameState.upgrades[type];
            const cost = baseCost * currentLevel;

            if (gameState.gold >= cost) {
                gameState.gold -= cost;
                gameState.upgrades[type]++;
                showMessage('升级成功！');
                renderUpgrades();
                updateStats();
            } else {
                showMessage('金币不足！');
            }
        }

        // 生成顾客
        function generateCustomer() {
            const customerTypes = [
                { name: '普通顾客', minPrice: 5, maxPrice: 20, waitTime: 5000 },
                { name: 'VIP顾客', minPrice: 20, maxPrice: 50, waitTime: 8000 },
                { name: '急切顾客', minPrice: 10, maxPrice: 30, waitTime: 3000 }
            ];

            const type = customerTypes[Math.floor(Math.random() * customerTypes.length)];
            const customer = {
                id: Date.now(),
                name: type.name,
                minPrice: type.minPrice,
                maxPrice: type.maxPrice,
                waitTime: type.waitTime,
                startTime: Date.now(),
                satisfied: false
            };

            gameState.customers.push(customer);
            renderCustomers();
        }

        // 渲染顾客
        function renderCustomers() {
            const container = document.getElementById('customers');
            container.innerHTML = '';

            gameState.customers.forEach(customer => {
                const waitTime = Date.now() - customer.startTime;
                const isWaiting = waitTime < customer.waitTime;

                const div = document.createElement('div');
                div.className = `customer ${isWaiting ? 'customer-waiting' : 'customer-served'}`;
                div.innerHTML = `
                    <span class="customer-name">${customer.name}</span>
                    <span>${isWaiting ? `等待中... ${Math.floor((customer.waitTime - waitTime) / 1000)}s` : '已购买'}</span>
                `;
                container.appendChild(div);
            });

            // 清理已完成的顾客
            gameState.customers = gameState.customers.filter(c => {
                return Date.now() - c.startTime < c.waitTime + 3000;
            });
        }

        // 顾客购买逻辑
        function customerBuy() {
            const customer = gameState.customers.find(c => {
                return !c.satisfied && Date.now() - c.startTime < c.waitTime;
            });

            if (!customer) return;

            // 顾客选择购买
            const products = gameState.products.filter(p => p.stock > 0);
            if (products.length === 0) return;

            const product = products[Math.floor(Math.random() * products.length)];
            const price = product.basePrice;

            if (price >= customer.minPrice && price <= customer.maxPrice) {
                // 顾客购买成功
                product.stock--;
                const revenue = price;
                gameState.gold += revenue;
                gameState.revenue += revenue;
                customer.satisfied = true;

                // 检查是否升级
                if (gameState.revenue >= gameState.level * 1000) {
                    gameState.level++;
                    showMessage(`升级！当前等级: ${gameState.level}`);
                }

                renderCustomers();
                renderProducts();
                updateStats();
            }
        }

        // 显示消息
        function showMessage(text) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.classList.add('show');
            setTimeout(() => {
                message.classList.remove('show');
            }, 2000);
        }

        // 游戏主循环
        function gameLoop() {
            customerBuy();
            renderCustomers();
            updateStats();
        }

        // 初始化
        function init() {
            renderProducts();
            renderUpgrades();
            updateStats();

            // 定时生成顾客
            setInterval(() => {
                if (gameState.customers.length < 5) {
                    generateCustomer();
                }
            }, 5000);

            // 游戏循环
            setInterval(gameLoop, 1000);

            showMessage('游戏开始！点击商品进行操作');
        }

        // 启动游戏
        init();
    </script>
</body>
</html>
